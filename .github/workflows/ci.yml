name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run WDIO tests and generate Allure report
        run: npm run ci:test
        env:
          CI: true

      - name: Verify Allure artifacts
        run: |
          if [ -d allure-results ]; then
            echo "Allure results files:"
            find allure-results -type f | sort
          else
            echo "ERROR: allure-results directory is missing"
            exit 1
          fi
          if [ -d allure-report ]; then
            echo "Allure report files:"
            find allure-report -type f | sort
          else
            echo "ERROR: allure-report directory is missing"
            exit 1
          fi

      - name: Upload Allure results artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  publish-report:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: extracted-report

      - name: Locate report directory
        run: |
          echo 'Extracted contents:'
          find extracted-report -maxdepth 3 -type d | sort
          if [ -f extracted-report/index.html ]; then
            echo 'DEPLOY_DIR=./extracted-report' >> $GITHUB_ENV
          elif [ -f extracted-report/allure-report/index.html ]; then
            echo 'DEPLOY_DIR=./extracted-report/allure-report' >> $GITHUB_ENV
          else
            echo 'Could not find extracted report index.html.'
            find extracted-report -maxdepth 4 -type f | sort
            exit 1
          fi

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.DEPLOY_DIR }}
          publish_branch: gh-pages
          allow_empty_commit: true

      - name: Show GitHub Pages URL
        run: |
          URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "::notice::Allure report published: $URL"
